<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIVA Admin Login</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* CARD */
.login-box{
  width:100%;
  max-width:380px;
  background:#fff;
  padding:30px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  text-align:center;
  animation:fadeIn 0.6s ease;
}

/* TITLE */
.login-box h2{
  margin-bottom:10px;
  color:#333;
}

.login-box p{
  font-size:14px;
  color:#888;
  margin-bottom:20px;
}

/* INPUT GROUP */
.input-group{
  position:relative;
  margin-bottom:20px;
}

.input-group input{
  width:100%;
  padding:12px 12px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
  font-size:14px;
  transition:0.3s;
}

.input-group input:focus{
  border-color:#8B0000;
  box-shadow:0 0 0 2px rgba(139,0,0,0.1);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#8B0000;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#b30000;
}

/* LOADER */
.loader{
  display:none;
  margin-top:10px;
}

.spinner{
  width:20px;
  height:20px;
  border:3px solid #ddd;
  border-top:3px solid #8B0000;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

@keyframes fadeIn{
  from{ opacity:0; transform:translateY(10px);}
  to{ opacity:1; transform:translateY(0);}
}

/* ERROR MESSAGE */
.error{
  color:red;
  font-size:13px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>🔐 Admin Login</h2>
  <p>Secure access to BIVA Dashboard</p>

  <div class="input-group">
    <input id="email" type="email" placeholder="Email">
  </div>

  <div class="input-group">
    <input id="password" type="password" placeholder="Password">
  </div>

  <button onclick="login()">Login</button>

  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="error" id="errorMsg"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDaZH5kn_mmxap3jOyw3Yhq55d936Jhl0g",
  authDomain: "biva-system.firebaseapp.com",
  projectId: "biva-system"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const ADMIN_EMAILS = [
  "brightinternationaldamaturu@gmail.com",
  "nuhuaudu1997@gmail.com",
  "admin3@gmail.com"
];

async function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const loader = document.getElementById("loader");
  const errorBox = document.getElementById("errorMsg");

  errorBox.innerText = "";

  if(!email || !password){
    errorBox.innerText = "Please fill all fields";
    return;
  }

  loader.style.display = "block";

  try{
    const res = await auth.signInWithEmailAndPassword(email, password);

    if(!ADMIN_EMAILS.includes(email.toLowerCase())){
      errorBox.innerText = "Access denied";
      await auth.signOut();
      loader.style.display = "none";
      return;
    }

    // ✅ Save session
    localStorage.setItem("adminLoggedIn","true");

    // smooth delay (premium feel)
    setTimeout(()=>{
      window.location.href = "./admin.html";
    }, 800);

  }catch(err){
    errorBox.innerText = err.message;
    loader.style.display = "none";
  }
}
</script>

</body>
</html>
